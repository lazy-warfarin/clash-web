services:
  clash-web:
    image: ghcr.io/lazy-warfarin/clash-web:latest
    container_name: clash-web
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - clash-web-data:/var/lib/clash-web
    tmpfs:
      - /run/clash-web:mode=0750,uid=0,gid=10001

volumes:
  clash-web-data:
