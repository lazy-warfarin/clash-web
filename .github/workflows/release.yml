name: release

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Package version (for example 0.1.0)
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  verify:
    name: Verify source
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.0 --activate
      - name: Install UI dependencies
        run: pnpm --dir ui install --frozen-lockfile
      - name: Test backend and frontend
        run: make test && pnpm --dir ui build

  deb:
    name: Build deb packages
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.0 --activate
      - name: Install pinned nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.47.0
      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            version="${INPUT_VERSION#v}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.1.0~git${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build amd64 and arm64 debs
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/build-release.sh
      - uses: actions/upload-artifact@v7
        with:
          name: clash-web-deb-${{ steps.version.outputs.version }}
          path: dist/**/*.deb
          if-no-files-found: error
          retention-days: 30
      - name: Attach debs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.deb
          generate_release_notes: true

  docker:
    name: Build multi-arch container
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Resolve image version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            version="${INPUT_VERSION#v}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="git-${GITHUB_SHA::7}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/v') }}
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=clash-web-docker
          cache-to: type=gha,mode=max,scope=clash-web-docker
          provenance: mode=max
          sbom: true
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
